<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>QueueFlow — Medical Center</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <header class="header">
            <div class="logo-block">
                <span class="logo-tag">+</span>
                <div>
                    <h1 class="logo-title">QueueFlow</h1>
                    <p class="logo-sub">Medical Center — Queue System</p>
                </div>
            </div>
            <a href="display.html" target="_blank" class="btn-display-link">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" />
                    <polyline points="15 3 21 3 21 9" />
                    <line x1="10" y1="14" x2="21" y2="3" />
                </svg>
                Launch Customer View
            </a>
        </header>

        <!-- Queue Type Tabs -->
        <div class="tab-bar">
            <button class="tab-btn active" data-tab="HMO" onclick="setTab('HMO')">
                <span class="tab-icon">🏥</span>
                <span class="tab-label">HMO</span>
            </button>
            <button class="tab-btn" data-tab="Cash" onclick="setTab('Cash')">
                <span class="tab-icon">💵</span>
                <span class="tab-label">Cash</span>
            </button>
            <button class="tab-btn" data-tab="Priority" onclick="setTab('Priority')">
                <span class="tab-icon">⭐</span>
                <span class="tab-label">Priority</span>
            </button>
        </div>

        <div class="now-serving-card">
            <div class="ns-label">NOW SERVING</div>
            <div class="ns-number" id="current">—</div>
            <div class="ns-sub" id="currentSub">&nbsp;</div>
        </div>

        <div class="main-grid">

            <!-- Queue List -->
            <div class="panel right-panel">
                <div class="history-section">
                    <div class="queue-header">
                        <span class="queue-title">Recent Activity</span>
                    </div>
                    <div class="history-log" id="historyLog">
                        <!-- Log entries will appear here -->
                    </div>
                </div>
            </div>

            <!-- Controls -->
            <div class="panel left-panel">
                <div class="next-up-block">
                    <div class="next-label">Next Up</div>
                    <div class="next-num" id="nextUp">—</div>
                </div>

                <button class="btn btn-primary" onclick="callNext()">
                    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2.5">
                        <polyline points="9 18 15 12 9 6" />
                    </svg>
                    Call Next Patient
                </button>

                <div class="action-grid">
                    <button class="btn btn-secondary" onclick="recallCurrent()">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.5">
                            <path d="M11 19a1 1 0 0 0 1 1h8a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-8a1 1 0 0 0-1 1v12z" />
                            <path d="M15 11l-3 3 3 3" />
                        </svg>
                        Recall
                    </button>
                    <button class="btn btn-secondary" onclick="skipNext()">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.5">
                            <path d="M5 4l10 8-10 8V4z" />
                            <line x1="19" y1="5" x2="19" y2="19" />
                        </svg>
                        Skip
                    </button>
                </div>

                <button class="btn btn-danger" onclick="resetQueue()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2.5">
                        <polyline points="1 4 1 10 7 10" />
                        <path d="M3.51 15a9 9 0 1 0 .49-3.5" />
                    </svg>
                    Reset This Queue
                </button>
            </div>

        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
